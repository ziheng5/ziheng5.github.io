# ParticleX Configuration
# https://github.com/theme-particlex/hexo-theme-particlex

# Avatar image
avatar: /images/head.jpg

# Home page background image
background:
    - /images/background3.jpg

# Loading image
loading: /images/loading.gif

# Optional colors for category and tag
colors:
    - "#ffa2c4"
    - "#00bcd4"
    - "#03a9f4"
    - "#00a596"
    - "#ff7d73"

# ParticleX theme icon is adopts the Font Awesome 6
# https://fontawesome.com

# Main menu navigation
menu:
    Homepage:
        name: house
        theme: solid
        link: /
    About:
        name: id-card
        theme: solid
        link: /2024/11/26/test
    Archives:
        name: box-archive
        theme: solid
        link: /archives
    Categories:
        name: bookmark
        theme: solid
        link: /categories/杂谈
    Tags:
        name: tags
        theme: solid
        link: /tags/杂谈
    Links:
        name: link
        theme: solid
        link: /friends
    Favorites:
        name: star
        theme: solid
        link: /favorites

# Side info card
card:
    enable: true
    description: |
        理想主义重症患者
    iconLinks:
        github:
            name: github
            theme: brands
            link: https://github.com/ziheng5
        bilibili:
            name: bilibili
            theme: brands
            link: https://space.bilibili.com/3546747278198798
        qq:
            name: qq
            theme: brands
            link: qq://2199325776
        discord: 
            name: discord
            theme: brands
            link: https://discord.gg/htf5PNEX
        kaggle: 
            name: kaggle
            theme: brands
            link: https://www.kaggle.com/ziheng4

    friendLinks:

# Footer info
footer:
    since: 2022
    # Customize the server domain name ICP
    ICP:
        enable: false
        code:
        link:

# Polyfill
# https://polyfill.io
polyfill:
    enable: true
    features:
        - default

# Highlight.js
# https://highlightjs.org
highlight:
    enable: true
    style: vs

# add toc to article
toc:
    max_depth: 6
    min_depth: 2
    class: toc
    decodeEntities: false
    list_number: false
    anchor:
        position: after
        symbol: h3

# KaTeX math rendering
math:
    enable: true

# Image preview
preview:
    enable: true

# Article encryption
crypto:
    enable: false


# Search
search:
    enable: true

# giscus
# https://github.com/giscus/giscus
giscus:
    enable: false
    src: https://giscus.app/client.js
    repo: ziheng5/ziheng5.github.io
    repoID: R_kgDONTCwmA
    category: Announcements
    categoryID: DIC_kwDONTCwmM4Cqj_g
    mapping: pathname
    strict: 0
    reactionsEnabled: 1
    emitMetadata: 0
    inputPosition: bottom
    theme: light
    lang: zh-CN
    crossorigin: anonymous

# Gitalk
# https://github.com/gitalk/gitalk
gitalk:
    enable: false
    clientID: # Default ClientID
    clientSecret: # Default ClientSecret
    repo: # The name of repository of store comments
    owner: # GitHub repo owner
    admin: # GitHub repo owner and collaborators, only these guys can initialize github issues
    language: # en, zh-CN, zh-TW, es-ES, fr, ru, de, pl and ko are currently available
    proxy: # CORS proxy

# Waline
# https://github.com/walinejs/waline
waline:
    enable: false
    serverURL: # Waline server address url, you should set this to your own link
    locale: # Locale: https://waline.js.org/guide/client/i18n.html#locale-option
    commentCount: true # If false, comment count will only be displayed in post page, not in home page
    pageview: true # Pageviews count, Note: You should not enable both `waline.pageview` and `leancloud_visitors`
    emoji: # Custom emoji
        - https://unpkg.com/@waline/emojis@1.2.0/weibo
        - https://unpkg.com/@waline/emojis@1.2.0/alus
        - https://unpkg.com/@waline/emojis@1.2.0/bilibili
        - https://unpkg.com/@waline/emojis@1.2.0/qq
        - https://unpkg.com/@waline/emojis@1.2.0/tieba
        - https://unpkg.com/@waline/emojis@1.2.0/tw-emoji
    meta: # Comment information, valid meta are nick, mail and link
        - nick
        - mail
        - link
    requiredMeta: # Set required meta field, e.g.: [nick] | [nick, mail]
        - nick
    lang: # Language, available values: en-US, zh-CN, zh-TW, pt-BR, ru-RU, jp-JP
    wordLimit: 0 # Word limit, no limit when setting to 0
    login: enable # Whether enable login, can choose from 'enable', 'disable' and 'force'
    pageSize: 10 # Comment per page

# Twikoo
# https://github.com/imaegoo/twikoo
twikoo:
    enable: false
    envID:
    region:
    path: location.pathname
    lang:

